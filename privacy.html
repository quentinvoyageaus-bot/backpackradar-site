const titles={en:"Privacy Policy",fr:"Politique de confidentialité",de:"Datenschutzrichtlinie",it:"Informativa sulla privacy",es:"Política de privacidad",pt:"Política de privacidade"};
const upd={en:"Last updated: March 18, 2026",fr:"Dernière mise à jour : 18 mars 2026",de:"Zuletzt aktualisiert: 18. März 2026",it:"Ultimo aggiornamento: 18 marzo 2026",es:"Última actualización: 18 de marzo de 2026",pt:"Última atualização: 18 de março de 2026"};

function setL(l){
    localStorage.setItem("br-site-lang",l);
    document.getElementById("title").textContent=titles[l];
    document.getElementById("updated").textContent=upd[l];
    let html="";
    P[l].forEach((s,i)=>{html+=`<h2>${i+1}. ${s[0]}</h2><p>${s[1]}</p>`});
    document.getElementById("content").innerHTML=html;
    document.querySelectorAll(".lang-btns button").forEach(b=>{b.classList.remove("active")});
    document.querySelectorAll(".lang-btns button")[["en","fr","de","it","es","pt"].indexOf(l)].classList.add("active");
}
document.addEventListener("DOMContentLoaded",()=>{setL(localStorage.getItem("br-site-lang")||"en")});
